[project]
name = "agentshive"
version = "0.1.0"
description = "Zecru AgentsHive — MCP bridge so coder AIs (Claude Code, Codex CLI) ask planner AIs (Claude/Codex desktop & mobile) instead of stopping to ask the human."
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0.0",
    "sqlmodel>=0.0.22",
    "psycopg[binary]>=3.2.0",
    "uvicorn>=0.30.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentshive"]

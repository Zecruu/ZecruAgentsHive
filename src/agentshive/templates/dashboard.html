<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgentsHive Dashboard</title>
<style>
:root { color-scheme: dark; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
       background: #0e0f12; color: #d6d9e0; margin: 0; padding: 16px; }
main { max-width: 1100px; margin: 0 auto; }
.card { background: #16181d; border: 1px solid #232732; border-radius: 8px;
        padding: 14px 16px; margin-bottom: 12px; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.spread { justify-content: space-between; }
h1 { font-size: 18px; margin: 0 0 4px 0; font-weight: 600; }
h2 { font-size: 14px; margin: 0 0 8px 0; color: #9aa0ab; text-transform: uppercase; letter-spacing: 0.04em; }
h2.panel-title { display: flex; justify-content: space-between; align-items: center; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge.active   { background: #1e3a2b; color: #6fdc9f; }
.badge.done     { background: #2a2a3a; color: #8a8fa7; }
.badge.superseded { background: #3a2a2a; color: #d09a8a; }
.badge.none     { background: #2a2a3a; color: #6a6f7a; }
.heartbeat { font-size: 12px; padding: 4px 10px; border-radius: 6px; font-variant-numeric: tabular-nums; }
.heartbeat.fresh  { background: #122a1c; color: #6fdc9f; }
.heartbeat.warm   { background: #2a2418; color: #e8c47a; }
.heartbeat.stale  { background: #2a1818; color: #ff8a78; }
.heartbeat.none   { background: #1a1c22; color: #6a6f7a; }
small.dim { color: #6a6f7a; font-size: 11px; }
.spec-preview { white-space: pre-wrap; color: #b0b6c2; font-size: 13px;
                margin-top: 8px; line-height: 1.45; max-height: 60px; overflow: hidden;
                transition: max-height 0.2s; }
.spec-preview.expanded { max-height: 60vh; overflow: auto; }
.toggle { font-size: 12px; color: #7aa9ff; cursor: pointer; user-select: none; margin-top: 4px; display: inline-block; }
.panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.panel-grid > div { background: #16181d; border: 1px solid #232732; border-radius: 8px; padding: 14px 16px; }
.item { border-top: 1px solid #232732; padding: 10px 0; font-size: 13px; }
.item:first-child { border-top: none; }
.item .body { white-space: pre-wrap; word-wrap: break-word; color: #d6d9e0; }
.item .meta { color: #6a6f7a; font-size: 11px; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.empty { color: #6a6f7a; font-size: 13px; padding: 6px 0; }
.badge.unacked { background: #2a2418; color: #e8c47a; }
.badge.acked   { background: #1a2a1c; color: #6fdc9f; }
.badge.redeliv { background: #3a2a2a; color: #d09a8a; }
.banner { position: fixed; top: 0; left: 0; right: 0; background: #ff8a78; color: #200; padding: 8px;
          text-align: center; font-weight: 600; z-index: 10; display: none; }
.banner.show { display: block; }
button { background: #232732; color: #d6d9e0; border: 1px solid #2c303a;
         padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
button:hover { background: #2c303a; }
button:disabled { opacity: 0.55; cursor: wait; }
button.primary { background: #2a3a5a; border-color: #3a4a6a; }
button.primary:hover { background: #3a4a6a; }
button.danger { background: #3a2222; border-color: #4a2828; color: #e89a8a; }
button.danger:hover { background: #4a2828; }
button.ship   { background: #1f3a28; border-color: #2c4a35; color: #6fdc9f; }
button.ship:hover { background: #2c4a35; }
form { margin: 0; }
.logout-form { display: inline; }
.actions { margin-top: 6px; display: flex; gap: 6px; }
textarea { width: 100%; box-sizing: border-box; min-height: 70px; padding: 8px 10px;
           background: #0e0f12; color: #d6d9e0; border: 1px solid #232732; border-radius: 6px;
           font-family: inherit; font-size: 13px; resize: vertical; }
.inline-form { margin-top: 8px; }
.inline-form .actions { margin-top: 6px; }
.inline-error { color: #ff8a78; font-size: 12px; margin-top: 4px; }
.stale-note   { background: #2a2418; color: #e8c47a; font-size: 12px;
                padding: 6px 10px; border-radius: 4px; margin-top: 6px; }
/* v1.9 project switcher — header dropdown + inline create form */
.proj-switcher { display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
                 padding-bottom: 10px; border-bottom: 1px solid #232732; }
.proj-switcher label { color: #9aa0ab; font-size: 11px; text-transform: uppercase;
                       letter-spacing: 0.04em; font-weight: 600; }
.proj-switcher select { background: #0e0f12; color: #d6d9e0; border: 1px solid #232732;
                        border-radius: 6px; padding: 5px 10px; font-size: 13px;
                        font-family: ui-monospace, SFMono-Regular, monospace; }
.proj-switcher .proj-actions { margin-left: auto; display: flex; gap: 6px; }
#new-proj-form { display: none; margin-top: 8px; gap: 6px; flex-wrap: wrap;
                 padding: 10px; background: #0e0f12; border: 1px solid #232732; border-radius: 6px; }
#new-proj-form.open { display: flex; }
#new-proj-form input { background: #16181d; color: #d6d9e0; border: 1px solid #232732;
                       border-radius: 4px; padding: 5px 8px; font-size: 12px;
                       font-family: ui-monospace, SFMono-Regular, monospace; }
#new-proj-form input.slug { width: 160px; }
#new-proj-form input.name { width: 180px; }
#new-proj-form input.desc { flex: 1; min-width: 140px; }
#new-proj-error { color: #ff8a78; font-size: 12px; margin-top: 6px; display: none; }
/* v1.8 Inbox chat panel — single-column conversation, bubbles aligned by direction. */
#inbox-feed { display: flex; flex-direction: column; gap: 8px; max-height: 50vh;
              overflow-y: auto; padding: 4px 2px; }
.bubble { max-width: 78%; padding: 8px 12px; border-radius: 12px; font-size: 13px;
          line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
.bubble.you     { align-self: flex-end; background: #2a3a5a; color: #e8eaf0;
                  border-bottom-right-radius: 4px; }
.bubble.planner { align-self: flex-start; background: #1f2a22; color: #d6dcd8;
                  border-bottom-left-radius: 4px; }
.bubble .bubble-meta { font-size: 10px; color: #6a7080; margin-top: 4px;
                       display: flex; gap: 6px; align-items: center; }
.bubble.you .bubble-meta { justify-content: flex-end; }
.bubble.planner .bubble-meta { justify-content: flex-start; }
.bubble-author { font-weight: 600; opacity: 0.75; }
.mission-divider { align-self: center; font-size: 10px; color: #6a7080;
                   padding: 2px 8px; background: #16181d;
                   border: 1px solid #232732; border-radius: 10px; }
#inbox-composer { display: flex; gap: 8px; margin-top: 10px;
                  border-top: 1px solid #232732; padding-top: 10px; }
#inbox-composer textarea { min-height: 38px; max-height: 140px; }
#inbox-composer button { align-self: flex-end; }
/* v1.11 per-Coder identity pill. Background hue is deterministic per coder_id
   (computed in coderHue) so the same Coder reads as the same color across
   reloads and across panels. Saturation/lightness fixed at 65%/30% — sits
   distinctly against the panel background without clashing with the badge row. */
.coder-pill { display: inline-block; padding: 1px 7px; border-radius: 8px;
              font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
              color: #e6e9f0; white-space: nowrap; }
.coder-pill.target { opacity: 0.85; font-style: italic; }
.coder-pill.broadcast { background: #2a3540; color: #9aa6bc; font-weight: 500; }
</style>
</head>
<body>
<div id="connlost" class="banner">Lost connection — retrying…</div>
<main>
  <div class="card" id="header">
    <!-- v1.9 project switcher: header dropdown lists active projects; switching
         updates the URL ?project=<slug> and reloads. Per Planner Q4, each
         project is a separate full-page context so existing routes/SSE pick
         up the new slug naturally. -->
    <div class="proj-switcher">
      <label for="proj-select">Project</label>
      <select id="proj-select" onchange="switchProject(this.value)">
        <option value="default">default</option>
      </select>
      <div class="proj-actions">
        <button type="button" onclick="toggleNewProjForm()" id="btn-new-proj">+ New project</button>
        <button type="button" onclick="archiveCurrentProject()" id="btn-archive-proj" style="display:none">Archive</button>
      </div>
    </div>
    <form id="new-proj-form" onsubmit="return createProject(event)">
      <input class="slug" id="new-proj-slug" placeholder="slug (kebab-case)" autocomplete="off" required>
      <input class="name" id="new-proj-name" placeholder="display name" autocomplete="off" required>
      <input class="desc" id="new-proj-desc" placeholder="description (optional)" autocomplete="off">
      <button class="primary" type="submit">Create</button>
      <button type="button" onclick="toggleNewProjForm()">Cancel</button>
    </form>
    <div id="new-proj-error"></div>

    <div class="row spread">
      <div>
        <div class="row" style="gap:8px;">
          <h1 id="mission-name">…</h1>
          <span id="mission-status" class="badge none">…</span>
          <button id="btn-mark-done" class="danger" style="display:none;" onclick="doMarkDone()">Mark mission DONE</button>
        </div>
        <small class="dim" id="mission-meta">loading…</small>
      </div>
      <div class="row">
        <span id="heartbeat" class="heartbeat none">…</span>
        <form class="logout-form" method="post" action="/dashboard/logout">
          <button type="submit">Logout</button>
        </form>
      </div>
    </div>
    <div id="spec-preview" class="spec-preview"></div>
    <span class="toggle" id="spec-toggle" style="display:none;">Show full spec</span>
    <div class="row" style="margin-top:8px;">
      <small class="dim" id="server-info">server: …</small>
    </div>
  </div>

  <div class="panel-grid">
    <div>
      <h2>Pending Questions</h2>
      <div id="questions"><div class="empty">Loading…</div></div>
    </div>
    <div>
      <h2>Pending Summaries</h2>
      <div id="summaries"><div class="empty">Loading…</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Messages</h2>
    <div class="panel-grid">
      <div>
        <h2 class="panel-title" style="color:#7aa9ff;">
          <span>Coder → Planner</span>
        </h2>
        <div id="msgs-c2p"><div class="empty">Loading…</div></div>
      </div>
      <div>
        <h2 class="panel-title" style="color:#7aa9ff;">
          <span>Planner → Coder</span>
          <button onclick="openSendForm()">+ Send</button>
        </h2>
        <div id="send-form-slot"></div>
        <div id="msgs-p2c"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </div>

  <!-- v1.8 Inbox: chat back-channel between dashboard user and the Planner. -->
  <div class="card" id="inbox-card">
    <h2 class="panel-title">
      <span>Chat with Planner</span>
      <small class="dim">async · global (no mission required)</small>
    </h2>
    <div id="inbox-feed"><div class="empty">Loading…</div></div>
    <form id="inbox-composer" onsubmit="return sendInboxMessage(event)">
      <textarea id="inbox-input" placeholder="Message the Planner… (Enter to send, Shift+Enter for newline)"
                onkeydown="handleInboxKeydown(event)"></textarea>
      <button class="primary" type="submit">Send</button>
    </form>
    <div id="inbox-error" class="inline-error" style="display:none"></div>
  </div>
</main>

<script>
const POLL_MS = 3000;
const $ = (id) => document.getElementById(id);
let specExpanded = false;
let fullSpec = "";
// Track open inline forms so competing-actor checks know what to scan.
// shape: openForms = { "answer:<question_id>": true, "respond:<summary_id>": true, "send": true }
const openForms = Object.create(null);

function ago(iso) {
  if (!iso) return "";
  const sec = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
  if (sec < 60)  return sec + "s ago";
  if (sec < 3600) return Math.floor(sec/60) + "m ago";
  if (sec < 86400) return Math.floor(sec/3600) + "h ago";
  return Math.floor(sec/86400) + "d ago";
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

// v1.9: append ?project=<slug> to any same-origin URL so the server-side
// ProjectContextMiddleware picks it up. No-op on the default project (cleaner
// URLs) and on the /projects management endpoints (which don't need a scope).
function withProject(url) {
  const slug = currentProjectSlug();
  if (slug === "default") return url;
  if (url.startsWith("/api/dashboard/projects")) return url;
  const sep = url.includes("?") ? "&" : "?";
  return `${url}${sep}project=${encodeURIComponent(slug)}`;
}

async function postJSON(url, body) {
  const r = await fetch(withProject(url), {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body || {}),
    credentials: "same-origin",
  });
  let data = null;
  try { data = await r.json(); } catch (_) {}
  return { status: r.status, data };
}

function showInlineError(slotId, msg) {
  const el = $(slotId);
  if (el) el.innerHTML = `<div class="inline-error">${escapeHtml(msg)}</div>`;
}

function renderItem(body, metas, extra) {
  return `<div class="item"><div class="body">${escapeHtml(body)}</div>` +
         `<div class="meta">${metas.join("")}</div>` +
         (extra || "") +
         `</div>`;
}

function actionButtons(buttons) {
  return `<div class="actions">${buttons.join("")}</div>`;
}

// v1.11 per-Coder identity. Hash → 0-359 hue so a given coder_id always paints
// the same color across panels/reloads. Cheap djb2-ish over UTF-16 code units;
// collisions are visually acceptable below ~40 distinct ids per project.
function coderHue(id) {
  let h = 5381;
  for (let i = 0; i < id.length; i++) {
    h = ((h << 5) + h + id.charCodeAt(i)) >>> 0;
  }
  return h % 360;
}
function coderPill(id) {
  if (!id) return "";
  const hue = coderHue(id);
  return `<span class="coder-pill" style="background:hsl(${hue}, 65%, 30%);" title="Coder ${escapeHtml(id)}">Coder: ${escapeHtml(id)}</span>`;
}
function targetPill(target) {
  // Only rendered on planner_to_coder messages where direction matters. Broadcast
  // gets a neutral pill so the Hivemind can tell at a glance who they addressed.
  if (target === null || target === undefined) {
    return `<span class="coder-pill broadcast">→ broadcast</span>`;
  }
  const hue = coderHue(target);
  return `<span class="coder-pill target" style="background:hsl(${hue}, 65%, 30%);" title="targeted at Coder ${escapeHtml(target)}">→ ${escapeHtml(target)}</span>`;
}

function renderQuestions(qs) {
  if (!qs.length) return `<div class="empty">No pending questions.</div>`;
  return qs.map(q => {
    const id = q.question_id;
    const formSlot = `<div id="form-answer-${id}"></div>`;
    const metas = [
      `<span>${ago(q.created_at)}</span>`,
      `<small class="dim">id ${id.slice(0,8)}</small>`,
    ];
    if (q.coder_id) metas.push(coderPill(q.coder_id));
    return renderItem(q.body, metas, actionButtons([
      `<button onclick="openAnswerForm('${id}')">Answer</button>`
    ]) + formSlot);
  }).join("");
}

function renderSummaries(ss) {
  if (!ss.length) return `<div class="empty">No pending summaries.</div>`;
  return ss.map(s => {
    const id = s.summary_id;
    const formSlot = `<div id="form-respond-${id}"></div>`;
    const metas = [
      `<span>${ago(s.created_at)}</span>`,
      `<small class="dim">id ${id.slice(0,8)}</small>`,
    ];
    if (s.coder_id) metas.push(coderPill(s.coder_id));
    return renderItem(s.body, metas, actionButtons([
      `<button onclick="openRespondForm('${id}')">Respond</button>`,
      `<button class="ship" onclick="doShipIt('${id}')">Ship it ✓</button>`,
    ]) + formSlot);
  }).join("");
}

function renderMessages(ms) {
  if (!ms.length) return `<div class="empty">No messages.</div>`;
  return ms.map(m => {
    const id = m.message_id;
    const ackBadge = m.delivered_at
      ? `<span class="badge acked">acked</span>`
      : `<span class="badge unacked">unacked</span>`;
    const redeliv = (m.redelivery_count || 0) > 0
      ? `<span class="badge redeliv">redelivered ×${m.redelivery_count}</span>`
      : "";
    const ackBtn = m.delivered_at
      ? ""
      : `<button onclick="doAck('${id}', this)">Ack</button>`;
    const metas = [
      `<span>${ago(m.created_at)}</span>`,
      ackBadge, redeliv, ackBtn,
    ];
    // v1.11: coder_id on coder→planner messages identifies the sender; the
    // target pill on planner→coder messages shows who the Hivemind addressed.
    if (m.coder_id) metas.push(coderPill(m.coder_id));
    if (m.direction === "planner_to_coder") metas.push(targetPill(m.target_coder_id));
    return renderItem(m.body, metas);
  }).join("");
}

function renderHeartbeat(hb) {
  const el = $("heartbeat");
  if (!hb || hb.last_seen === null) {
    el.className = "heartbeat none";
    el.textContent = "Coder not connected";
    return;
  }
  const sec = hb.freshness_seconds;
  el.textContent = `Coder seen ${sec}s ago`;
  if (sec < 30) el.className = "heartbeat fresh";
  else if (sec < 60) el.className = "heartbeat warm";
  else el.className = "heartbeat stale";
}

// ---------- Inline form openers ----------

function openAnswerForm(qid) {
  const slot = $(`form-answer-${qid}`);
  if (!slot || slot.dataset.open === "1") return;
  slot.dataset.open = "1";
  openForms["answer:" + qid] = true;
  slot.innerHTML = `
    <div class="inline-form">
      <textarea id="ta-answer-${qid}" placeholder="Answer to the Coder…" autofocus></textarea>
      <div class="actions">
        <button class="primary" onclick="submitAnswer('${qid}')">Submit</button>
        <button onclick="closeAnswerForm('${qid}')">Cancel</button>
      </div>
      <div id="err-answer-${qid}"></div>
    </div>`;
  setTimeout(() => $(`ta-answer-${qid}`)?.focus(), 0);
}
function closeAnswerForm(qid) {
  const slot = $(`form-answer-${qid}`);
  if (slot) { slot.dataset.open = ""; slot.innerHTML = ""; }
  delete openForms["answer:" + qid];
}
async function submitAnswer(qid) {
  const text = $(`ta-answer-${qid}`)?.value || "";
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  const { status, data } = await postJSON("/api/dashboard/answer", { question_id: qid, answer: text });
  if (status === 200 && data?.ok) {
    closeAnswerForm(qid);
    tick();
    return;
  }
  if (btn) { btn.disabled = false; btn.textContent = "Submit"; }
  showInlineError(`err-answer-${qid}`, data?.error || `request failed (${status})`);
}

function openRespondForm(sid) {
  const slot = $(`form-respond-${sid}`);
  if (!slot || slot.dataset.open === "1") return;
  slot.dataset.open = "1";
  openForms["respond:" + sid] = true;
  slot.innerHTML = `
    <div class="inline-form">
      <textarea id="ta-respond-${sid}" placeholder="Direction, request changes, or 'continue'…" autofocus></textarea>
      <div class="actions">
        <button class="primary" onclick="submitRespond('${sid}')">Submit</button>
        <button onclick="closeRespondForm('${sid}')">Cancel</button>
      </div>
      <div id="err-respond-${sid}"></div>
    </div>`;
  setTimeout(() => $(`ta-respond-${sid}`)?.focus(), 0);
}
function closeRespondForm(sid) {
  const slot = $(`form-respond-${sid}`);
  if (slot) { slot.dataset.open = ""; slot.innerHTML = ""; }
  delete openForms["respond:" + sid];
}
async function submitRespond(sid) {
  const text = $(`ta-respond-${sid}`)?.value || "";
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  const { status, data } = await postJSON("/api/dashboard/respond", { summary_id: sid, response: text });
  if (status === 200 && data?.ok) {
    closeRespondForm(sid);
    tick();
    return;
  }
  if (btn) { btn.disabled = false; btn.textContent = "Submit"; }
  showInlineError(`err-respond-${sid}`, data?.error || `request failed (${status})`);
}

async function doShipIt(sid) {
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  const { status, data } = await postJSON("/api/dashboard/respond", { summary_id: sid, response: "Ship it." });
  if (status === 200 && data?.ok) { tick(); return; }
  if (btn) { btn.disabled = false; btn.textContent = "Ship it ✓"; }
  alert(data?.error || `Ship it failed (${status})`);
}

async function doAck(mid, btn) {
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  const { status, data } = await postJSON("/api/dashboard/ack", { message_id: mid });
  if (status === 200 && data?.ok) { tick(); return; }
  if (btn) { btn.disabled = false; btn.textContent = "Ack"; }
  alert(data?.error || `Ack failed (${status})`);
}

function openSendForm() {
  const slot = $("send-form-slot");
  if (!slot || slot.dataset.open === "1") return;
  slot.dataset.open = "1";
  openForms["send"] = true;
  slot.innerHTML = `
    <div class="inline-form">
      <textarea id="ta-send" placeholder="Send a note to the Coder…" autofocus></textarea>
      <div class="actions">
        <button class="primary" onclick="submitSend()">Send</button>
        <button onclick="closeSendForm()">Cancel</button>
      </div>
      <div id="err-send"></div>
    </div>`;
  setTimeout(() => $("ta-send")?.focus(), 0);
}
function closeSendForm() {
  const slot = $("send-form-slot");
  if (slot) { slot.dataset.open = ""; slot.innerHTML = ""; }
  delete openForms["send"];
}
async function submitSend() {
  const text = $("ta-send")?.value || "";
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  const { status, data } = await postJSON("/api/dashboard/send", { body: text });
  if (status === 200 && data?.ok) {
    closeSendForm();
    tick();
    return;
  }
  if (btn) { btn.disabled = false; btn.textContent = "Send"; }
  showInlineError("err-send", data?.error || `request failed (${status})`);
}

async function doMarkDone() {
  if (!confirm("Mark this mission done? The Coder will stop.")) return;
  const btn = $("btn-mark-done");
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  const { status, data } = await postJSON("/api/dashboard/mark-done", {});
  if (status === 200 && data?.ok) { tick(); return; }
  if (btn) { btn.disabled = false; btn.textContent = "Mark mission DONE"; }
  alert(data?.error || `Mark done failed (${status})`);
}

// ---------- Competing-actor detection ----------
// If an open form refers to an item that the next poll shows is no longer pending,
// paint a "stale" note above the textarea. Don't auto-close — user may want to copy
// their draft. Only stamp the note once.

function markStaleIfNeeded(kind, id, currentIds) {
  const key = `${kind}:${id}`;
  if (!openForms[key]) return;
  if (currentIds.has(id)) return;  // still pending — nothing to do
  const slotId = `form-${kind}-${id}`;
  const slot = $(slotId);
  if (!slot || !slot.querySelector(".inline-form")) return;
  if (slot.querySelector(".stale-note")) return;
  const note = document.createElement("div");
  note.className = "stale-note";
  note.textContent = `Resolved elsewhere (e.g., from Claude.ai Planner). Your draft is safe to copy; submit will likely fail.`;
  slot.querySelector(".inline-form").appendChild(note);
}

// ---------- State rendering (factored out so SSE 'state' events and polling can both call it) ----------

function renderState(s) {
  const m = s.active_mission;
  if (m) {
    $("mission-name").textContent = m.name;
    $("mission-status").textContent = m.status;
    $("mission-status").className = "badge " + m.status;
    $("mission-meta").textContent = `mission ${m.mission_id.slice(0,8)} · created ${ago(m.created_at)}`;
    fullSpec = m.spec || "";
    const preview = m.spec_preview || "";
    $("spec-preview").textContent = specExpanded ? fullSpec : preview;
    $("spec-toggle").style.display = fullSpec.length > preview.length ? "inline-block" : "none";
    $("spec-toggle").textContent = specExpanded ? "Collapse" : "Show full spec";
    $("btn-mark-done").style.display = m.status === "active" ? "inline-block" : "none";
  } else {
    $("mission-name").textContent = "No active mission";
    $("mission-status").textContent = "none";
    $("mission-status").className = "badge none";
    $("mission-meta").textContent = "Planner has not created a mission yet.";
    $("spec-preview").textContent = "";
    $("spec-toggle").style.display = "none";
    $("btn-mark-done").style.display = "none";
  }
  renderHeartbeat(s.coder_heartbeat);

  $("server-info").textContent =
    `server v${s.server_info.server_version} · catalog ${s.server_info.tools_catalog_hash} · up since ${ago(s.server_info.started_at)}`;

  const qs = s.pending_questions || [];
  const ss = s.pending_summaries || [];
  $("questions").innerHTML = renderQuestions(qs);
  $("summaries").innerHTML = renderSummaries(ss);
  $("msgs-c2p").innerHTML = renderMessages((s.messages && s.messages.coder_to_planner) || []);
  $("msgs-p2c").innerHTML = renderMessages((s.messages && s.messages.planner_to_coder) || []);
  renderInbox(s.inbox || []);

  const qIds = new Set(qs.map(q => q.question_id));
  const sIds = new Set(ss.map(x => x.summary_id));
  Object.keys(openForms).forEach(key => {
    const [kind, id] = key.split(":", 2);
    if (kind === "answer")  markStaleIfNeeded("answer",  id, qIds);
    if (kind === "respond") markStaleIfNeeded("respond", id, sIds);
  });
}

// ---------- v1.8 Inbox: chat with the Planner ----------

// Tracks which planner_to_user message_ids the dashboard has already kicked off
// an auto-ack for. The 2s delay (per Planner Q4) catches fast tab-crashes while
// still keeping the unacked badge from sticking around in the UI. user_to_planner
// messages are NEVER auto-acked — the Planner must ack them via ack_message after
// processing per the v1.2 at-least-once contract.
const inboxScheduledAck = new Set();
let inboxLastRenderedId = null;

function renderInbox(items) {
  const feed = $("inbox-feed");
  if (!feed) return;
  if (!items.length) {
    feed.innerHTML = `<div class="empty">No messages yet. Type below to start a conversation.</div>`;
    return;
  }
  // Track scroll: only auto-scroll to bottom if user was already near the bottom
  // OR a new message arrived (so reading scrollback isn't disrupted by a poll).
  const wasNearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;
  const newestId = items[items.length - 1].message_id;
  const hasNew = newestId !== inboxLastRenderedId;
  inboxLastRenderedId = newestId;

  let lastMissionId = undefined;
  const parts = [];
  for (const m of items) {
    if (m.mission_id && m.mission_id !== lastMissionId && lastMissionId !== undefined) {
      parts.push(`<div class="mission-divider">─── mission ${escapeHtml(m.mission_id.slice(0,8))} ───</div>`);
    }
    lastMissionId = m.mission_id;
    const isYou = m.direction === "user_to_planner";
    const cls = isYou ? "you" : "planner";
    const author = isYou ? "You" : "Planner";
    const ackBadge = m.delivered_at
      ? `<span class="badge acked">acked</span>`
      : `<span class="badge unacked">unacked</span>`;
    parts.push(
      `<div class="bubble ${cls}">` +
        escapeHtml(m.body) +
        `<div class="bubble-meta">` +
          `<span class="bubble-author">${author}</span>` +
          `<span>${ago(m.created_at)}</span>` +
          ackBadge +
        `</div>` +
      `</div>`
    );

    // Auto-ack only planner_to_user rows, only once per id, only after 2s.
    if (!isYou && !m.delivered_at && !inboxScheduledAck.has(m.message_id)) {
      inboxScheduledAck.add(m.message_id);
      const mid = m.message_id;
      setTimeout(() => {
        postJSON("/api/dashboard/ack", { message_id: mid }).catch(() => {
          // Network blip — clear the flag so the next render retries.
          inboxScheduledAck.delete(mid);
        });
      }, 2000);
    }
  }
  feed.innerHTML = parts.join("");
  if (wasNearBottom || hasNew) {
    feed.scrollTop = feed.scrollHeight;
  }
}

function handleInboxKeydown(e) {
  // Enter sends; Shift+Enter inserts a newline.
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendInboxMessage(e);
  }
}

async function sendInboxMessage(e) {
  if (e && e.preventDefault) e.preventDefault();
  const input = $("inbox-input");
  const err = $("inbox-error");
  const body = (input.value || "").trim();
  err.style.display = "none";
  if (!body) return false;
  // Disable composer during send so double-Enter doesn't double-post.
  input.disabled = true;
  try {
    // postJSON returns {status, data}; the server's {ok, error} envelope is on data.
    const { status, data } = await postJSON("/api/dashboard/send-to-planner", { body });
    if (!data || !data.ok) {
      err.textContent = (data && data.error) || `Send failed (HTTP ${status}).`;
      err.style.display = "block";
      return false;
    }
    input.value = "";
    // Optimistic refresh: SSE will deliver the new state momentarily, but
    // poke the polling fallback once so users not on SSE see it immediately.
    tick();
  } catch (e2) {
    err.textContent = "Network error — try again.";
    err.style.display = "block";
  } finally {
    input.disabled = false;
    input.focus();
  }
  return false;
}

// ---------- v1.9 Project switcher ----------

// Current project slug derived from the URL ?project= param. When switching,
// we update the URL and full-page reload so the SSE connection re-subscribes
// to the new project's channel and the state payload is fresh-fetched.
function currentProjectSlug() {
  const params = new URLSearchParams(window.location.search);
  return (params.get("project") || "default").toLowerCase();
}

function urlWithProject(slug) {
  const u = new URL(window.location.href);
  if (slug === "default") {
    u.searchParams.delete("project");
  } else {
    u.searchParams.set("project", slug);
  }
  return u.toString();
}

async function loadProjects() {
  try {
    const r = await fetch("/api/dashboard/projects", { credentials: "same-origin" });
    if (!r.ok) return;
    const { projects } = await r.json();
    const sel = $("proj-select");
    const cur = currentProjectSlug();
    sel.innerHTML = projects.map(p =>
      `<option value="${escapeHtml(p.slug)}"${p.slug === cur ? " selected" : ""}>${escapeHtml(p.slug === "default" ? "default" : p.name + " (" + p.slug + ")")}</option>`
    ).join("");
    // Show archive button only when not on default
    $("btn-archive-proj").style.display = cur === "default" ? "none" : "inline-block";
  } catch (e) {
    // Non-fatal — dropdown stays with the default option
  }
}

function switchProject(slug) {
  if (slug === currentProjectSlug()) return;
  window.location.href = urlWithProject(slug);
}

function toggleNewProjForm() {
  const form = $("new-proj-form");
  form.classList.toggle("open");
  if (form.classList.contains("open")) {
    $("new-proj-slug").focus();
    $("new-proj-error").style.display = "none";
  }
}

async function createProject(e) {
  if (e && e.preventDefault) e.preventDefault();
  const slug = ($("new-proj-slug").value || "").trim().toLowerCase();
  const name = ($("new-proj-name").value || "").trim();
  const desc = ($("new-proj-desc").value || "").trim() || null;
  const errBox = $("new-proj-error");
  errBox.style.display = "none";
  try {
    // postJSON returns {status, data} — the server's {ok, error} envelope lives
    // on data, NOT on the wrapper. Earlier draft mis-read this as r.ok.
    const { status, data } = await postJSON("/api/dashboard/projects", { slug, name, description: desc });
    if (!data || !data.ok) {
      errBox.textContent = (data && data.error) || `Create failed (HTTP ${status}).`;
      errBox.style.display = "block";
      return false;
    }
    window.location.href = urlWithProject(slug);
  } catch (err) {
    errBox.textContent = "Network error — try again.";
    errBox.style.display = "block";
  }
  return false;
}

async function archiveCurrentProject() {
  const slug = currentProjectSlug();
  if (slug === "default") return;
  if (!confirm(`Archive project '${slug}'? Its data is preserved but it disappears from the switcher.`)) return;
  try {
    const r = await fetch(`/api/dashboard/projects/${encodeURIComponent(slug)}/archive`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      credentials: "same-origin",
    });
    if (r.status === 401) { location.href = "/dashboard/login"; return; }
    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      alert(body.error || "Archive failed.");
      return;
    }
    // Land back in default after archiving.
    window.location.href = urlWithProject("default");
  } catch (err) {
    alert("Network error — try again.");
  }
}

// ---------- Transport: SSE primary, polling fallback (no oscillation) ----------

let es = null;
let sseFailedCount = 0;
let pollingHandle = null;
const SSE_FAIL_BEFORE_FALLBACK = 2;

async function tick() {
  try {
    const r = await fetch(withProject("/api/dashboard/state"), { credentials: "same-origin" });
    if (r.status === 401) { location.href = "/dashboard/login"; return; }
    if (!r.ok) throw new Error("status " + r.status);
    $("connlost").classList.remove("show");
    renderState(await r.json());
  } catch (e) {
    $("connlost").classList.add("show");
  }
}

function startPolling() {
  if (pollingHandle !== null) return;  // already polling, don't double-up
  tick();
  pollingHandle = setInterval(tick, POLL_MS);
}

function startSSE() {
  try {
    es = new EventSource(withProject("/api/dashboard/events"), { withCredentials: true });
  } catch (e) {
    startPolling();
    return;
  }
  es.addEventListener("state", evt => {
    try {
      renderState(JSON.parse(evt.data));
      $("connlost").classList.remove("show");
      sseFailedCount = 0;  // a successful event resets the failure counter
    } catch (e) {
      // Bad JSON shouldn't happen but don't crash the listener if it does.
      console.error("renderState failed", e);
    }
  });
  es.onerror = () => {
    // EventSource auto-reconnects per the server's retry: directive. We count
    // failures and only fall back to polling after a few in a row, so a brief
    // network blip doesn't permanently demote us.
    sseFailedCount += 1;
    if (sseFailedCount >= SSE_FAIL_BEFORE_FALLBACK) {
      if (es) { try { es.close(); } catch (_) {} es = null; }
      $("connlost").classList.add("show");
      startPolling();
    }
  };
}

$("spec-toggle").addEventListener("click", () => {
  specExpanded = !specExpanded;
  $("spec-preview").classList.toggle("expanded", specExpanded);
  $("spec-preview").textContent = specExpanded ? fullSpec : fullSpec.slice(0, 300);
  $("spec-toggle").textContent = specExpanded ? "Collapse" : "Show full spec";
});

// Page load: populate the project switcher dropdown, then try SSE.
loadProjects();
if (typeof EventSource !== "undefined") {
  startSSE();
} else {
  startPolling();
}
</script>

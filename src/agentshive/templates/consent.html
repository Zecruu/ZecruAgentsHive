<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgentsHive — Authorize Application</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
       background: #0e0f12; color: #d6d9e0; margin: 0;
       display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #16181d; border: 1px solid #232732; border-radius: 8px;
        padding: 28px 32px; width: 420px; }
h1 { font-size: 18px; margin: 0 0 8px 0; font-weight: 600; }
.subtle { color: #9aa0ab; font-size: 13px; margin-bottom: 18px; }
.client { background: #0e0f12; border: 1px solid #232732; border-radius: 6px;
          padding: 12px 14px; margin-bottom: 16px; }
.client .name { font-weight: 600; color: #e8e9ec; }
.client .row { font-size: 12px; color: #9aa0ab; margin-top: 4px; font-family: ui-monospace, SFMono-Regular, monospace; word-break: break-all; }
.scopes { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0 0 0; }
.scope { background: #2a3a5a; color: #d6d9e0; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-family: ui-monospace, monospace; }
label { display: block; font-size: 12px; color: #9aa0ab; margin: 14px 0 6px 0; text-transform: uppercase; letter-spacing: 0.04em; }
input { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 14px;
        background: #0e0f12; color: #d6d9e0; border: 1px solid #232732; border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, monospace; }
.actions { display: flex; gap: 10px; margin-top: 18px; }
button { flex: 1; padding: 10px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid #3a4a6a; }
.approve { background: #2a5a3a; border-color: #3a6a4a; color: #e8e9ec; }
.approve:hover { background: #3a6a4a; }
.deny { background: #1a1e26; color: #d6d9e0; }
.deny:hover { background: #232732; }
.error { color: #ff8a78; margin-top: 12px; font-size: 13px; }
.help { color: #6a6f7a; margin-top: 14px; font-size: 12px; line-height: 1.4; }
</style>
</head>
<body>
<form class="card" method="post" action="/oauth/consent">
  <h1>Authorize application</h1>
  <div class="subtle">{cookie_note}</div>

  <div class="client">
    <div class="name">{client_name}</div>
    <div class="row">client_id: {client_id}</div>
    <div class="row">redirect: {redirect_uri}</div>
    <div class="scopes">{scope_tags}</div>
  </div>

  {api_key_field}

  <input type="hidden" name="client_id" value="{client_id_escaped}">
  <input type="hidden" name="redirect_uri" value="{redirect_uri_escaped}">
  <input type="hidden" name="redirect_uri_provided_explicitly" value="{redirect_uri_provided_explicitly}">
  <input type="hidden" name="code_challenge" value="{code_challenge_escaped}">
  <input type="hidden" name="state" value="{state_escaped}">
  <input type="hidden" name="scopes" value="{scopes_escaped}">
  <input type="hidden" name="resource" value="{resource_escaped}">

  <div class="actions">
    <button class="deny" type="submit" name="decision" value="deny">Deny</button>
    <button class="approve" type="submit" name="decision" value="approve">Approve</button>
  </div>

  {error_block}

  <div class="help">Approving grants this client an access token that lasts 1 hour and a refresh token that lasts 30 days. You can revoke it anytime.</div>
</form>
</body>
</html>
